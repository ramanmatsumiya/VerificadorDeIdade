```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="usuario" placeholder="Digite o usuário">

    <input type="password" id="senha" placeholder="Digite a senha">

    <button onclick="fazerLogin()">Entrar</button>

    <p id="resultado"></p>
  </div>

  <script>
    function fazerLogin() {
      let usuario = document.getElementById("usuario").value;
      let senha = document.getElementById("senha").value;
      let resultado = document.getElementById("resultado");

      if (usuario === "admin" && senha === "1234") {
        resultado.innerText = "Login realizado com sucesso";
      } else {
        resultado.innerText = "Usuário ou senha inválidos";
      }
    }
  </script>

</body>
</html>
